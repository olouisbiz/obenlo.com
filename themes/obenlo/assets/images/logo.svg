<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Obenlo minimalist wordmark SVG -->
  <style>
    .text { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 40px; fill: #000000; letter-spacing: -1px; }
    .dot { fill: #FF5A5F; } /* Coral color accent */
  </style>
  <text x="10" y="45" class="text">obenl</text>
  <!-- Precisely aligned 'o' and dot -->
  <g transform="translate(103, 45)">
    <text x="0" y="0" class="text">o</text>
    <circle cx="11" cy="-10.5" r="4" class="dot"/>
  </g>
</svg>
